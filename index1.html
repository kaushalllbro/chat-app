<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

#container{
width:100%;
max-width:700px;
height:100vh;
display:flex;
flex-direction:column;
}

#header{
background:#202c33;
padding:12px;
font-size:18px;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
padding:10px;
margin:6px;
border-radius:12px;
max-width:75%;
word-wrap:break-word;
font-size:15px;
}

.me{
background:#005c4b;
margin-left:auto;
}

.other{
background:#202c33;
}

.time{
font-size:10px;
margin-left:8px;
color:#ccc;
}

#typing{
height:18px;
font-size:12px;
color:#aaa;
padding-left:10px;
}

#inputArea{
display:flex;
padding:10px;
background:#202c33;
gap:8px;
}

#msg{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:15px;
outline:none;
}

button{
padding:12px 16px;
border:none;
background:#00a884;
color:white;
border-radius:8px;
cursor:pointer;
}

@media (max-width:600px){

#container{
height:100vh;
}

.msg{
max-width:85%;
font-size:14px;
}

button{
padding:10px 14px;
}

}

</style>
</head>

<body>

<div id="container">

<div id="header">Private Chat</div>

<div id="chat"></div>

<div id="typing"></div>

<div id="inputArea">
<input id="msg" placeholder="Type a message">
<button onclick="send()">Send</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyA7aG5ZEZHYc8ai8vtWj_iTSjg95yedCwk",
authDomain: "chat123-86ac5.firebaseapp.com",
databaseURL: "https://chat123-86ac5-default-rtdb.firebaseio.com",
projectId: "chat123-86ac5",
storageBucket: "chat123-86ac5.firebasestorage.app",
messagingSenderId: "543715372055",
appId: "1:543715372055:web:8196ca626d25e73c210052"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatBox = document.getElementById("chat");
const input = document.getElementById("msg");
const typingDiv = document.getElementById("typing");

let username = localStorage.getItem("chatUser");

if(!username){
username = Math.random()>0.5 ? "User1" : "User2";
localStorage.setItem("chatUser",username);
}

const chatRef = ref(db,"chat");
const typingRef = ref(db,"typing/"+username);

function send(){

let text = input.value.trim();

if(text==="") return;

push(chatRef,{
name:username,
text:text,
time:Date.now()
});

input.value="";
set(typingRef,false);

}

window.send = send;

onChildAdded(chatRef,(data)=>{

let msg = data.val();

let div = document.createElement("div");

div.className = "msg " + (msg.name===username?"me":"other");

let time = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

div.innerHTML = msg.text + "<span class='time'>"+time+"</span>";

chatBox.appendChild(div);

chatBox.scrollTop = chatBox.scrollHeight;

});

input.addEventListener("input",()=>{

set(typingRef,true);

setTimeout(()=>{
set(typingRef,false);
},1200);

});

onValue(ref(db,"typing"),(snap)=>{

let data=snap.val();

if(!data) return;

let other=Object.keys(data).find(x=>x!==username);

if(other && data[other]){
typingDiv.innerText="typing...";
}else{
typingDiv.innerText="";
}

});

</script>

</body>
</html>
