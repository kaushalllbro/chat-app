<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SwiftChat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111b21;
color:white;
}

header{
background:#202c33;
padding:12px;
display:flex;
justify-content:space-between;
}

button{
background:#00a884;
border:none;
padding:8px 12px;
border-radius:6px;
color:white;
}

#chatList,#chatRoom{
height:100vh;
display:flex;
flex-direction:column;
}

#list{
flex:1;
overflow:auto;
}

.chatItem{
padding:12px;
border-bottom:1px solid #2a3942;
cursor:pointer;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.bubble{
padding:10px;
margin:5px;
border-radius:10px;
max-width:70%;
}

.me{
background:#005c4b;
align-self:flex-end;
}

.other{
background:#202c33;
align-self:flex-start;
}

#inputArea{
display:flex;
padding:10px;
background:#202c33;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:20px;
}

</style>
</head>

<body>

<div id="chatList">

<header>
<div>Chats</div>
<div>
<button onclick="createPrivate()">+Chat</button>
<button onclick="createGroup()">+Group</button>
</div>
</header>

<div id="list"></div>

</div>


<div id="chatRoom" style="display:none">

<header>
<button onclick="back()">←</button>
<div id="chatTitle"></div>
</header>

<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>
</div>

</div>


<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getDatabase,ref,push,set,onValue,onChildAdded} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
databaseURL:"YOUR_DATABASE_URL",
projectId:"YOUR_PROJECT"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);


let username=localStorage.getItem("user");

if(!username){
username=prompt("Enter your name");
localStorage.setItem("user",username);
}


const list=document.getElementById("list");
const messages=document.getElementById("messages");

let currentChat=null;


function loadChats(){

onValue(ref(db,"chats"),snap=>{

list.innerHTML="";

let data=snap.val();

if(!data) return;

Object.entries(data).forEach(([id,chat])=>{

if(chat.members && chat.members[username]){

let div=document.createElement("div");

div.className="chatItem";

div.innerText=chat.name;

div.onclick=()=>openChat(id,chat.name);

list.appendChild(div);

}

});

});

}

loadChats();


function createPrivate(){

let other=prompt("Enter username");

if(!other) return;

let chatID="chat_"+Date.now();

set(ref(db,"chats/"+chatID),{

name:other,
type:"private",
members:{
[username]:true,
[other]:true
}

});

}


function createGroup(){

let name=prompt("Group name");

let members=prompt("Members (comma separated)");

let listMembers=members.split(",");

let mem={};

mem[username]=true;

listMembers.forEach(u=>mem[u.trim()]=true);

let chatID="group_"+Date.now();

set(ref(db,"chats/"+chatID),{

name:name,
type:"group",
members:mem

});

}


function openChat(id,title){

currentChat=id;

document.getElementById("chatList").style.display="none";
document.getElementById("chatRoom").style.display="flex";

document.getElementById("chatTitle").innerText=title;

messages.innerHTML="";

onChildAdded(ref(db,"messages/"+id),snap=>{

let m=snap.val();

let div=document.createElement("div");

div.className="bubble "+(m.sender===username?"me":"other");

div.innerText=m.text;

messages.appendChild(div);

messages.scrollTop=messages.scrollHeight;

});

}


function send(){

let text=document.getElementById("msg").value;

if(!text) return;

push(ref(db,"messages/"+currentChat),{

sender:username,
text:text,
time:Date.now()

});

document.getElementById("msg").value="";

}


function back(){

document.getElementById("chatList").style.display="flex";
document.getElementById("chatRoom").style.display="none";

}

window.send=send;
window.back=back;
window.createPrivate=createPrivate;
window.createGroup=createGroup;

</script>

</body>
</html>
